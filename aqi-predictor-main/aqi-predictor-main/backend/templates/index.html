<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AQI Predictor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
    --bg:#f1f5f9;
    --card:#ffffff;
    --primary:#2563eb;
    --text:#0f172a;
    --muted:#64748b;
    --border:#e2e8f0;

    --good:#22c55e;
    --moderate:#eab308;
    --sensitive:#f97316;
    --unhealthy:#ef4444;
    --veryunhealthy:#a855f7;
    --hazardous:#7f1d1d;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
}

.container{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

h1{
    text-align:center;
    color:var(--primary);
}

.grid{
    display:grid;
    grid-template-columns:1fr 360px;
    gap:30px;
}

@media(max-width:900px){
    .grid{grid-template-columns:1fr;}
}

.card{
    background:var(--card);
    padding:20px;
    border-radius:12px;
    border:1px solid var(--border);
}

.inputs{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

@media(max-width:600px){
    .inputs{grid-template-columns:1fr;}
}

label{
    font-size:14px;
    color:var(--muted);
}

input[type=number]{
    width:100%;
    padding:6px;
    margin-top:5px;
    border-radius:6px;
    border:1px solid var(--border);
}

button{
    width:100%;
    padding:12px;
    background:var(--primary);
    color:white;
    border:none;
    border-radius:8px;
    margin-top:20px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#1d4ed8;
}

.result{
    text-align:center;
}

.aqi-value{
    font-size:50px;
    font-weight:bold;
    margin:20px 0;
}

.aqi-category{
    font-size:18px;
    font-weight:bold;
    margin-bottom:15px;
}

.bar-container{
    margin-top:15px;
}

.bar-row{
    margin-bottom:8px;
}

.bar-label{
    font-size:12px;
    text-align:left;
    margin-bottom:3px;
    color:var(--muted);
}

.bar{
    height:8px;
    background:#e2e8f0;
    border-radius:6px;
    overflow:hidden;
}

.bar-fill{
    height:100%;
    width:0%;
    background:var(--primary);
    transition:0.5s;
}

.error{
    color:red;
    margin-top:10px;
    display:none;
}
</style>
</head>
<body>

<div class="container">
<h1>🌫️ AQI Predictor</h1>

<div class="grid">

<div class="card">
<h3>Enter Pollutant Values</h3>

<div class="inputs">
<div><label>PM2.5</label><input type="number" id="pm25" value="120"></div>
<div><label>PM10</label><input type="number" id="pm10" value="200"></div>
<div><label>NO2</label><input type="number" id="no2" value="60"></div>
<div><label>SO2</label><input type="number" id="so2" value="30"></div>
<div><label>CO</label><input type="number" step="0.01" id="co" value="1.2"></div>
<div><label>O3</label><input type="number" id="o3" value="75"></div>
<div><label>Temperature</label><input type="number" id="temp" value="28"></div>
<div><label>Humidity</label><input type="number" id="humidity" value="60"></div>
</div>

<button onclick="predict()">Predict AQI</button>
<div class="error" id="errorMsg">
Cannot connect to Flask API. Make sure app.py is running.
</div>
</div>

<div class="card result">
<h3>Prediction Result</h3>
<div class="aqi-value" id="aqiValue">--</div>
<div class="aqi-category" id="aqiCategory">--</div>

<h4 style="margin-top:20px;">Selected Input Levels</h4>
<div class="bar-container" id="bars"></div>

</div>

</div>
</div>

<script>
function getAQIColor(aqi){
    if(aqi<=50) return ["Good","var(--good)"];
    if(aqi<=100) return ["Moderate","var(--moderate)"];
    if(aqi<=150) return ["Unhealthy for Sensitive","var(--sensitive)"];
    if(aqi<=200) return ["Unhealthy","var(--unhealthy)"];
    if(aqi<=300) return ["Very Unhealthy","var(--veryunhealthy)"];
    return ["Hazardous","var(--hazardous)"];
}

async function predict(){

const payload={
pm25:parseFloat(pm25.value),
pm10:parseFloat(pm10.value),
no2:parseFloat(no2.value),
so2:parseFloat(so2.value),
co:parseFloat(co.value),
o3:parseFloat(o3.value),
temp:parseFloat(temp.value),
humidity:parseFloat(humidity.value)
};

try{
const response=await fetch("/predict",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
});

if(!response.ok) throw new Error();

const data=await response.json();

const [category,color]=getAQIColor(data.aqi);

aqiValue.innerText=data.aqi.toFixed(2);
aqiValue.style.color=color;
aqiCategory.innerText=category;
aqiCategory.style.color=color;

createBars(payload);

errorMsg.style.display="none";

}catch{
errorMsg.style.display="block";
}
}

function createBars(data){

const maxValues={
pm25:300,pm10:400,no2:150,so2:80,co:3,o3:180,temp:50,humidity:100
};

bars.innerHTML="";

for(let key in data){

const percent=(data[key]/maxValues[key])*100;

bars.innerHTML+=`
<div class="bar-row">
<div class="bar-label">${key.toUpperCase()} : ${data[key]}</div>
<div class="bar">
<div class="bar-fill" style="width:${percent}%"></div>
</div>
</div>
`;
}
}
</script>

</body>
</html>
